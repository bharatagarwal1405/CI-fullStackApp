name: build-test-deploy_environment
on: 
    workflow_dispatch:

env: 
    NODE_VERSION: '18.x'

jobs:
    build-test-deploy:
        runs-on: ubuntu-latest
        steps:
        - name: Checkout code
          uses: actions/checkout@v3
    
        - name: Set up Node.js
          uses: actions/setup-node@v3
          with:
            node-version: ${{ env.NODE_VERSION }}
            cache: "npm"
    
        - name: Install, Build, Test
          run: |
            npm install
            npm run build --if-present
            npm test

    stage-deploy:
        needs: build-test-deploy
        runs-on: ubuntu-latest
        environment: 
            name: staging
        
        steps:
            - name: Deploy to staging
              run: echo "Deploying to staging environment..." # Replace with actual deployment command
    
            
    productions-deploy:
        needs: stage-deploy
        runs-on: ubuntu-latest
        environment: 
            name: production
        steps:
            - name: Deploy to production
              run: echo "Deploying to production environment..." # Replace with actual deployment command
